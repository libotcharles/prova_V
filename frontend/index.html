<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce TPSI - Multi User</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-flex">
            <span class="logo">🛒 MyShop</span>

            <div class="input-group nav-actions">
                <button onclick="switchView('user')" class="btn-nav" id="btn-user">
                    Vista Utente
                </button>
                <button onclick="switchView('admin')" class="btn-nav" id="btn-admin">
                    Vista Admin
                </button>
            </div>
        </div>
    </nav>

    <header class="user-bar">
        <div class="container bar-flex">
            <div class="user-info">
                <div class="user-chip">
                    👤 <span id="userName">Caricamento...</span>
                </div>

                <select id="userSelector" onchange="cambiaUtente(this.value)">
                </select>
            </div>

            <div class="credits">
                💰 Saldo: <span id="userCredits">0</span> crediti
            </div>
        </div>
    </header>

    <main class="container">
        <section id="admin-add-product" class="admin-panel hidden">
            <h3 class="section-title">➕ Aggiungi Nuovo Prodotto</h3>
            <p class="section-subtitle">
                Crea un nuovo prodotto da aggiungere al catalogo.
            </p>

            <div class="input-group">
                <input type="text" id="add-nome" placeholder="Nome Prodotto">
                <input type="number" id="add-prezzo" placeholder="Prezzo">
                <input type="number" id="add-stock" placeholder="Stock iniziale">
                <button onclick="aggiungiProdotto()" class="btn-admin">
                    Crea Prodotto
                </button>
            </div>
        </section>

        <section id="admin-manage-users" class="admin-panel hidden">
            <h3 class="section-title">👥 Gestione Utenti</h3>
            <p class="section-subtitle">
                Registra nuovi utenti e controlla quelli esistenti.
            </p>

            <div class="input-group">
                <input type="text" id="new-username" placeholder="Nome Nuovo Utente">
                <button onclick="creaUtente()" class="btn-admin">
                    Registra Utente
                </button>
            </div>

            <div id="users-list-container" class="mt-2"></div>
        </section>

        <section class="section-card">
            <h2 class="page-title">Catalogo Prodotti</h2>
            <p class="section-subtitle">
                Esplora il catalogo e acquista con i tuoi crediti.
            </p>

            <div id="app" class="grid-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
