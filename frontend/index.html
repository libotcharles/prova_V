<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RandomGames - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-layout">
    <div class="auth-hero">
      <div class="hero-badge">RandomGames Platform</div>
      <h1>Benvenuto su RandomGames</h1>
      <p>
        Accedi alla piattaforma per acquistare prodotti oppure,
        se sei amministratore, per gestire utenti e catalogo.
      </p>
    </div>

    <div class="auth-panel" id="login-box">
      <h2>Login</h2>
      <p class="auth-subtitle">Inserisci le tue credenziali</p>

      <div id="login-message" class="message-box"></div>

      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="Inserisci username">
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Inserisci password">
      </div>

      <button id="login-submit" class="btn-primary auth-btn">
        Accedi
      </button>

      <div class="auth-links">
        <p>Non hai un account?</p>
        <a href="register.html" class="btn-secondary">Vai alla registrazione</a>
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
