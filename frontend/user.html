<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop - Area Utente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container nav-flex">
      <span class="logo">🛒 RandomGames</span>
      <button id="logout-btn" class="btn-secondary" type="button">Logout</button>
    </div>
  </nav>

  <header class="user-bar">
    <div class="container bar-flex">
      <div class="user-info">
        <div class="user-chip">
          👤 <span id="userName">Utente</span>
        </div>
        <div class="role-badge">
          Ruolo: <span id="userRole">user</span>
        </div>
      </div>

      <div class="credits">
        💰 Saldo: <span id="userCredits">0</span> crediti
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section-card">
      <h2 class="page-title">Catalogo Prodotti</h2>
      <p class="section-subtitle">
        Acquista i prodotti disponibili con il tuo saldo.
      </p>

      <div id="user-products" class="grid-container"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
